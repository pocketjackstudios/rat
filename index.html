<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 1. Carregar A-Frame primeiro -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- 2. Carregar APENAS a versão MindAR para A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <!-- 3. Corrigida a sintaxe da cena -->
    <a-scene
        mindar-image="imageTargetSrc: https://raw.githubusercontent.com/pocketjackstudios/rat/main/assets/targets/targets.mind;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <!-- Links Raw diretos -->
            <img id="card" src="https://raw.githubusercontent.com/pocketjackstudios/rat/main/assets/image/rat.png">
            <a-asset-item id="model"
                src="https://raw.githubusercontent.com/pocketjackstudios/rat/main/assets/models/rat_rig.gltf"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Tente uma escala menor se o rato não aparecer -->
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1" src="#model"></a-gltf-model>
        </a-entity>
    </a-scene>
</body>

</html>
