<!DOCTYPE html>

<html lang="en">

<head>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene mindar-image="imageTargetSrc:https://github.com/pocketjackstudios/rat/blob/main/assets/targets/target.mind"
        vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
        <a-assets>
            <a-asset-item id="model"
                src="https://github.com/pocketjackstudios/rat/blob/main/assets/models/rat_rig.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled:false"> </a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model rotation="0 0 0" position="0 0 0" scale="1 1 1"
                src="#model"></a-gltf-model>
        </a-entity>
    </a-scene>
</body>

</html>
